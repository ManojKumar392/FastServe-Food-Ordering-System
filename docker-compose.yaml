services:

  postgres:
    image: postgres:16
    container_name: fastserve-postgres
    environment:
      POSTGRES_DB: FastServe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data


  redis:
    image: redis:7
    container_name: fastserve-redis
    ports:
      - "6379:6379"


  app:
    build: .
    container_name: fastserve-app
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}


volumes:
  postgres-data: